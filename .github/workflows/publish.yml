name: Publish Package

on:
  push:
    tags:
      - "v*"

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Verify CLI Catalog
        run: node ./bin/eyen-skills.mjs list

      - name: Pack npm Tarball
        run: npm pack --json

      - name: Publish to npm
        run: npm publish --access public
